__use_yte__: true  # enable YTE templating for Snakemake configfile

# taxon ID for NCBI dataset download
dataset_taxid: 11320  # influenza A virus taxon id

# host orders with frequency below this in subsampled data are collapsed to "other"
collapse_low_freq_host_order: 0.005

# The final exported auspice JSONs are put in a file with the name
# "auspices/{auspice_prefix}_{tree}.json" for each {tree} in `trees`
# defined below. Typically make this the same name as this repo if
# you want to be able to view via Nextstrain community builds, eg
# https://nextstrain.org/community/jbloomlab/flu-ha-trees-mhcII-binding@main/H5
auspice_prefix: flu-ha-trees-mhcII-binding

# Shared viridis color scale for phenotype scores on trees
phenotype_color_scale: &phenotype_color_scale
  - "#440154"
  - "#472d7b"
  - "#3b528b"
  - "#2c728e"
  - "#21918c"
  - "#28ae80"
  - "#5ec962"
  - "#addc30"
  - "#fde725"

# What to do if accessions specified to include / keep have bad dates that are
# reset by augur refine given the value of `clock-filter-iqd`? Options:
# "ignore" -> let dates be reset; "error" -> raise an error
bad_dates_in_keep_accessions_action: ignore

# make separate trees for each of these HA subtypes, with per-tree configuration
trees:
  ?for subtype in ["H1", "H2", "H3", "H5", "H7"]:
    ?subtype:
      subtype: ?f'{subtype}N\\d{{1,2}}'  # regex for subtype
      cds_length_range: ?f'data/trees/{subtype}/cds_length_range.yaml'  # only keep CDSs in this length range
      augur_subsample:  # subsampling of sequences by augur subsample
        samples:
          subsample_all:
            include: ?f'data/trees/{subtype}/accessions_to_include.txt'
            exclude: ?f'data/trees/{subtype}/accessions_to_exclude.txt'
            exclude_ambiguous_dates_by: year
            max_sequences: 2000
            group_by: [year, region]
      augur_refine:  # keyword arguments to augur refine
        clock-filter-iqd: 4   # filter in augur refine to remove outliers from molecular clock
        keep-ids: ?f'data/trees/{subtype}/accessions_to_include.txt'  # keep even if the fail filter; if strains kept this way fail filter their dates are inferred rather than taken from metadata.
      reference_sequence: ?f'data/trees/{subtype}/reference_sequence.fa'
      annotation: ?f'data/trees/{subtype}/annotation.gff'
      genes: [SigPep, HA1, HA2]
      mutation_effects: ?f'data/trees/{subtype}/mutation_effects.tsv'
      phenotypes:
        H5 tufted duck MHCII entry increase: MHCII entry increase (H5)
        H5 tufted duck MHCII binding: MHCII binding (H5)
        H7 tufted duck MHCII entry increase: MHCII entry increase (H7)
        H7 tufted duck MHCII binding: MHCII binding (H7)
      phenotype_color_scale: *phenotype_color_scale
      title: ?f'Influenza {subtype} HA phylogeny colored by predicted tufted duck MHC-II usage'
      auspice_config: data/auspice_config/auspice_config.json
      description: data/auspice_config/description.md  # in file, "{tree}" replaced with tree name (eg, "H5")
