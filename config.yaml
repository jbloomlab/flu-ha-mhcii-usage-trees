__use_yte__: true  # enable YTE templating for Snakemake configfile

# taxon ID for NCBI dataset download
dataset_taxid: 11320  # influenza A virus taxon id

# host orders with frequency below this in subsampled data are collapsed to "other"
collapse_low_freq_host_order: 0.005

# Token -> host tax ID map used by `infer_missing_host` to fill host info for
# rows where NCBI has neither `host` nor `host_tax_id`. See data/README.md.
strain_token_host_map: data/strain_token_host_map.tsv

# The final exported auspice JSONs are put in a file with the name
# "auspices/{auspice_prefix}_{tree}.json" for each {tree} in `trees`
# defined below. Typically make this the same name as this repo if
# you want to be able to view via Nextstrain community builds, eg
# https://nextstrain.org/community/jbloomlab/flu-ha-mhcii-usage-trees/H5
auspice_prefix: flu-ha-mhcii-usage-trees

# Shared viridis color scale for phenotype scores on trees
phenotype_color_scale: &phenotype_color_scale
  - "#440154"
  - "#472d7b"
  - "#3b528b"
  - "#2c728e"
  - "#21918c"
  - "#28ae80"
  - "#5ec962"
  - "#addc30"
  - "#fde725"

# What to do if accessions specified to include / keep have bad dates that are
# reset by augur refine given the value of `clock-filter-iqd`? Options:
# "ignore" -> let dates be reset; "error" -> raise an error
bad_dates_in_keep_accessions_action: error

# What to do if an accession in a tree's strain_annotations.tsv is not a tip
# in the final refined tree? Options: "ignore" -> warn and drop that row;
# "error" -> raise an error listing the missing accessions.
missing_strain_annotations_action: error

# Make separate trees for each HA subtype, with per-tree configuration.
# For some subtypes we also make compact trees.
# Configuration defined using YTE templating.
__variables__:
  tree_specs:  # define subtype, treename, augur_subsample
    - - H1
      - H1
      - samples:
          subsample_non-avian:
            exclude: data/trees/H1/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1100
            group_by: [year]
            # strains with "VFFSP_UNITHER" in name are from lab-passaging study
            query: "(host_general != 'avian') and (host_general != '') and (not strain.str.contains('VFFSP_UNITHER'))"
          subsample_avian:
            exclude: data/trees/H1/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 400
            group_by: [year, region]
            query: "(host_general == 'avian')"
    - - H1
      - H1-compact
      - samples:
          subsample_non-avian:
            exclude: data/trees/H1/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 200
            group_by: [year]
            # strains with "VFFSP_UNITHER" in name are from lab-passaging study
            query: "(host_general != 'avian') and (host_general != '') and (not strain.str.contains('VFFSP_UNITHER'))"
          subsample_avian:
            exclude: data/trees/H1/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 75
            group_by: [year, region]
            query: "(host_general == 'avian')"
    - - H2
      - H2
      - samples:
          subsample_non-avian:
            exclude: data/trees/H2/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1000
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H2/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1000
            group_by: [year, region]
            query: "(host_general == 'avian')"
    - - H2
      - H2-compact
      - samples:
          subsample_non-avian:
            exclude: data/trees/H2/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 125
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H2/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 125
            group_by: [year, region]
            query: "(host_general == 'avian')"
    - - H3
      - H3
      - samples:
          subsample_non-avian:
            exclude: data/trees/H3/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1100
            group_by: [year]
            # FJ2158* is set of mouse-adapted strains
            query: "(host_general != 'avian') and (host_general != '') and (not accession.str.startswith('FJ2158'))"
          subsample_avian:
            exclude: data/trees/H3/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 450
            group_by: [year, region]
            query: "host_general == 'avian'"
    - - H3
      - H3-compact
      - samples:
          subsample_non-avian:
            exclude: data/trees/H3/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 200
            group_by: [year]
            # FJ2158* is set of mouse-adapted strains
            query: "(host_general != 'avian') and (host_general != '') and (not accession.str.startswith('FJ2158'))"
          subsample_avian:
            exclude: data/trees/H3/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 75
            group_by: [year, region]
            query: "host_general == 'avian'"
    - - H5
      - H5
      - samples:
          subsample_non-avian:
            exclude: data/trees/H5/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 400
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H5/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1100
            group_by: [year, region]
            query: "host_general == 'avian'"
    - - H5
      - H5-compact
      - samples:
          subsample_non-avian:
            exclude: data/trees/H5/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 75
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H5/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 175
            group_by: [year, region]
            query: "host_general == 'avian'"
    - - H7
      - H7
      - samples:
          subsample_non-avian:
            exclude: data/trees/H7/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 400
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H7/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 1100
            group_by: [year, region]
            # exclude Rostock 1934 strains, which are clock outliers
            query: "(host_general == 'avian') and (not strain.str.endswith('1934'))"
    - - H7
      - H7-compact
      - samples:
          subsample_non-avian:
            exclude: data/trees/H7/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 75
            group_by: [year]
            query: "(host_general != 'avian') and (host_general != '')"
          subsample_avian:
            exclude: data/trees/H7/accessions_to_exclude.txt
            exclude_ambiguous_dates_by: year
            max_sequences: 175
            group_by: [year, region]
            # exclude Rostock 1934 strains, which are clock outliers
            query: "(host_general == 'avian') and (not strain.str.endswith('1934'))"
trees:
  ?for subtype, treename, augur_subsample in tree_specs:
    ?treename:
      subtype: ?f'{subtype}N\\d{{1,2}}'  # regex for subtype
      manual_adds:  # sequences specified to add manually not in Genbank accessions
        sequences: ?f'data/trees/{subtype}/manual_add_sequences.fa'
        metadata: ?f'data/trees/{subtype}/manual_add_metadata.tsv'
      # user-editable list of Genbank accessions to include. The pipeline merges
      # this with all manual_add accessions into the combined include file, and
      # that combined file is what is passed to augur subsample --include and
      # augur refine --keep-ids (wired in the Snakefile, not here).
      accessions_to_include: ?f'data/trees/{subtype}/accessions_to_include.txt'
      cds_length_range: ?f'data/trees/{subtype}/cds_length_range.yaml'  # only keep CDSs in this length range
      augur_subsample: ?augur_subsample
      augur_refine:  # keyword arguments to augur refine
        clock-filter-iqd: 4   # filter in augur refine to remove outliers from molecular clock
      reference_sequence: ?f'data/trees/{subtype}/reference_sequence.fa'
      annotation: ?f'data/trees/{subtype}/annotation.gff'
      genes: [SigPep, HA1, HA2]
      mutation_effects: ?f'data/trees/{subtype}/mutation_effects.tsv'
      strain_annotations: ?f'data/trees/{subtype}/strain_annotations.tsv'
      phenotypes:
        H5 tufted duck MHCII entry increase: MHCII entry increase (H5)
        H5 tufted duck MHCII binding: MHCII binding (H5)
        H7 tufted duck MHCII entry increase: MHCII entry increase (H7)
        H7 tufted duck MHCII binding: MHCII binding (H7)
      phenotype_color_scale: *phenotype_color_scale
      title: ?f'Influenza {subtype} HA phylogeny annotated by MHC-II usage'
      auspice_config: data/auspice_config/auspice_config.json
      description: data/auspice_config/description.md  # in file, "{tree}" replaced with tree name (eg, "H5")

# Derived (pruned) trees produced by post-processing a source tree's Auspice
# JSON down to tips whose per-strain annotations match a filter. Each entry's
# key becomes the pruned tree name (the Auspice output will be
# "auspice/{auspice_prefix}_{name}.json"). Required sub-keys: `source_tree`
# (a key in `trees` above) and `keep_where` (mapping of column->value applied
# to the source tree's strain_annotations.tsv; tips whose row matches all
# pairs are retained). Optional `title` overrides the source tree's Auspice
# title. YAML parses unquoted `yes`/`no` as booleans, so keep_where string
# values should be quoted to match the TSV.
pruned_trees:
  ?for subtype in ["H1", "H2", "H3", "H5"]:
    ?f"{subtype}-with-titers":
      source_tree: ?subtype
      keep_where:
        has_titers: "yes"
      title: ?f'Influenza {subtype} HA phylogeny of only sequences with directly measured MHC-II mediated entry titers'
